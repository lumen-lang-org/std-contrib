name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: [self-hosted, diff]
    steps:
      - uses: actions/checkout@v4

      - name: Install Lumen
        run: curl -fsSL https://raw.githubusercontent.com/lumen-lang-org/lumen/main/install.sh | sh

      - name: Test every package
        run: |
          export PATH="$HOME/.lumen/bin:$PATH"
          fail=0
          for f in packages/*/*.ts; do
            echo "== $f =="
            lumen test "$f" || fail=1
          done
          exit $fail
